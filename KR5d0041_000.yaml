front:
  text: 黃帝內經靈樞略業一黃帝問曰夫人之始生也何築為基何立為順何失而死何得而生岐伯曰以母為基以父為順失神者死得神者生黃帝曰何者為神岐伯曰血氣和合榮衛已通五藏已成神氣舍心魂魄畢具乃成人也榮衛之行不失其常六府化穀津液布揚故能長久天地之間六合之內不離於五人亦應之黃帝問曰何謂德氣生精神魂魄心意志思智慮請聞其故岐伯對曰天之在我者德也地之在我者氣也德流氣薄而生者也故生之來謂之精兩精相薄謂之神隨神而往來謂之魂并精而出入謂之魄所以任物者謂之心心有所憶謂之意意之所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智故智者之養生也必順四時而適寒暑和喜怒而安居處節隂陽而調柔剛如是則邪僻不至長生久視矣岐伯曰血氣精神者所以奉於生而周於性命者也經脈者所以行血氣而榮衛隂陽濡筋骨而利關節者也衛氣者所以溫爪肉而充皮膚肥腠理而司開闔者也志意者所以御精神收魂魄適寒溫和喜怒者也是故血和則經脈流行榮衛隂陽筋骨徑強關節滑利矣衛氣和則爪解筋滑和皮膚調柔腠理緻密矣志意和則精神專直魂魄不散悔忿不至五藏不受邪氣矣寒溫和則六府化穀風痹不作經脈通利肢節矣此人之常平也五藏者所以藏精神血氣魂魄也六府者所以化水穀而行津液也此人之所以具受於天矣岐伯曰隂陽俱盛邪乃得住岐伯曰正邪從外襲內而未有定舍及淫於藏不得定處與榮衛俱行而魂魄飛揚使人卧不安而善夢也
  hash: sha256:3777b8699443fe0525cf76017569b7a50fdf69b0215bf2c09bd40e0c8282d86f
