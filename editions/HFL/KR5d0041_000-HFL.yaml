body:
  text: 六氣論篇黄帝問曰余聞人有精氣津液血脉余意以爲一氣耳今乃辯爲六名余不知所以願聞何謂精岐伯對曰兩神相薄合而成形常先身生是謂精帝曰何謂氣岐伯曰上焦開發宣五穀味薰膚充身澤毛若露之溉是謂氣帝曰何謂津岐伯曰腠理發泄汗出腠是謂津帝曰何謂液岐伯曰穀氣滿淖澤注於骨骨屬屈伸以澤補益腦髓皮膚潤澤是謂液帝曰何謂血岐伯曰中焦受血於汁變化而赤是謂血帝曰何謂脉岐伯曰擁遏榮氣令無所避是謂脉也夫氣呼則出吸則入天之精氣其大數常出三而入一也故穀不入半日則氣衰一日則氣少矣上焦如霧中焦如溝下焦如瀆帝曰榮衛之行皆何道出入岐伯曰榮出中焦衛出上焦清者爲榮濁者爲衛榮在脉中衛在脉外黄帝問曰何氣爲榮何氣爲衛岐伯對曰人受氣於穀穀入於胃以傳與肺五藏六府皆以受氣其清者爲榮濁者爲衛榮在脉中衛在脉外榮周不休五十周而復大會隂陽相貫如環無端衛氣行於隂二十五度行於陽亦二十五度分爲晝夜故氣至陽而行至隂而止夫液者所以灌精而濡空竅者也故上液之道開泣出不止則液竭液竭則精不灌精不灌則目無所見矣五藏者合神氣魂魄而藏之六府者受穀而行之受氣而揚之經脉者受血而榮之合而以治夫平人胃滿則腸虚腸滿則胃虚更滿更虚氣得上下五藏安定血脉和利精神乃居故神者水穀之精氣也夫氣之在脉也邪氣在上者言邪氣之中人也高故在上也濁氣在中者言水穀皆入于胃其清氣上注于肺濁氣流于腹胃言寒温不適飲食不節而病于腹胃故命曰濁氣在中也清氣在下者言清濕地之氣必從足始故曰清氣在下也隂與陽别寒與熱爭兩氣相薄合癰膿岐伯曰人所受氣者穀也穀之所注者胃也胃者水穀氣血之海也海之所出者雰霧而布太虚也胃之所出者氣血而行經隧也經隧者五藏六府之大絡也肺合大腸大腸者傳送之府也心合小腸小腸者受盛之府也肝合膽膽者中清之府也脾合胃胃者五穀之府也腎合膀胱膀胱者津液之府也少隂屬腎腎氣上連肺故將兩藏三焦者中瀆之府也水道出焉此六府之與合者也夫五藏常内閱於上七竅故肺氣通於鼻鼻和則鼻能知臭香矣心氣通於舌舌和則舌能知五味矣肝氣通於目目和則目能辨五色矣脾氣通於口口和則口能知五穀矣腎氣通於耳耳和則耳能聞五音矣五藏不和則七竅不通六府不和則留結爲癰故邪在府則陽脉不利陽脉不利則氣留之氣留之則陽氣盛矣陽氣大盛則隂脉不利隂脉不利則氣留之氣留之則隂氣盛矣隂氣大盛則陽氣弗能榮故曰關陽氣大盛則隂氣弗能榮故曰格隂陽俱盛不得相榮故曰關格關格者不得盡期而死矣黄帝曰氣獨行五藏不榮六府何也岐伯曰氣之不得無行也如水之流如日月之行不休故隂脉營其藏陽脉營其府如環之無端莫知其紀終而復始其溢之氣内溉藏府外濡腠理也舍精神於心以知古今心者五藏六府之大主精神之舍也其藏堅固邪不能容容之則心傷心傷則神去神去則死矣深居靜處與神往來閉户塞牖魂魄不散專意一神精氣不分無聞人聲以收其精必一其神閉其外門眞氣乃存黄帝問曰有一脉生十餘病者或痛或癰或寒或熱或癢或痹或不仁變化無窮其故何也岐伯對曰此皆邪氣之所生也帝曰余聞有眞氣有正氣有邪氣何謂眞氣岐伯曰眞氣者所受於天與穀氣并而充身也正氣者正風也從一方來非實風又非虚風也邪氣者虚風之賊傷人者也其中人也深不能自去正風之中人也淺合而自去其氣柔弱不能勝眞氣故自去虚邪之中人也洒漽動形起毫毛而發腠理其入深内薄於骨則爲骨痹也薄於脉中則血不通則爲癰也薄於内與衛氣相薄陽勝者則爲熱隂勝者則爲寒寒則眞氣去眞氣去則寒薄於皮膚之間其氣外發腠理開毫毛摇氣往來則爲不仁也虚邪偏客於身半其入深内干榮衛榮衛稍衰則眞氣去邪獨留發爲偏枯也黄帝問曰余聞腸胃受穀上焦出氣以温爪肉而養骨節通腠理中焦出氣如露上注溪谷而滲經脉津液和調變化赤而爲血血和則經脉先滿滿乃注於經絡經絡皆盈乃注於經脉隂陽已張因息乃行行有綱紀周有道理與天合同不得休止切而調之從虛去實寫則不足疾則氣減留之先後從實去虚補則有餘血氣已調形神乃持余已知血氣之平與不平未知癰疽之所從生成敗之時死生之期期有遠近何以度之可得聞乎岐伯對曰經脉流行不止與天同度與地合紀故天宿失度日月薄蝕地經失紀水道流溢草廬不成五穀不殖徑路不通民不往來衖聚邑居别離異處血氣猶然請言其故夫血脉榮衛周流不休上應星宿下應經數寒氣客於經脉之中則血泣血泣則不通不通則衛氣歸之不得復返故癰腫也寒氣化爲熱熱勝則腐肉腐肉則爲膿膿不瀉則爛筋筋爛則傷骨骨傷則髓銷髓銷則骨空骨空不得泄瀉則筋枯骨虚則筋骨肌肉不相榮經脉敗漏熏於五藏藏傷故死矣迷惑論篇岐伯曰五藏六府之精氣皆上注於目而爲睛目者五藏六府之精榮衛魂魄之所常榮神氣之所生也故神勞則魂魄散志意亂也是故瞳子黑睛法於隂白睛赤脉法於陽故隂陽俱轉而睛明也目者心之使心者神之舍也故神分睛亂而不轉卒然見非常之處精神魂魄散不得相因而迷惑也黄帝問曰人之善忘者何氣使然岐伯對曰上氣不足下氣有餘腸胃實而心肺虚虚則榮衛留於下乆不以時上故善忘也無音論篇黄帝問曰人之卒然憂恚而無言者何道之塞何氣之不行使音不彰願聞其方少師對曰咽喉者水穀之道也喉嚨者氣之所以上下也會厭者音聲之户也唇者音聲之扇也舌者音聲之機也懸雍者音聲之關也䪻顙者分氣之所泄也横骨者神氣之所使主發舌者也故人之鼻洞涕出不收者䪻顙不閉分氣失也是故厭小而薄則發氣疾其開闔利其出氣易厭大而厚則開闔難其出氣遲故重言也所謂吃者其言重卒然無音者寒氣客於厭則厭不能發發不能至其機扇其機扇開闔不利故無音也黄帝内經靈樞略
  hash: sha256:60c92a857f83c402d41987bfa592496b85f3f73ee3dfce0e30abfcc8e8d73448
